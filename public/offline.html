<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a2236">
  <title>Baidoos POS - Offline</title>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #334155, #0f172a 60%);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: #f8fafc;
      padding: 1.25rem;
    }

    .card {
      width: min(420px, 100%);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 1.25rem;
      box-shadow: 0 14px 30px rgba(2, 6, 23, 0.35);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.2rem;
    }

    p {
      margin: 0.2rem 0;
      line-height: 1.4;
      color: #cbd5e1;
    }

    .btn {
      margin-top: 0.85rem;
      border: 0;
      border-radius: 10px;
      padding: 0.6rem 0.85rem;
      font-weight: 600;
      background: #3b82f6;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You are offline</h1>
    <p>Baidoos POS is running in app mode, but this page needs internet right now.</p>
    <p>Reconnect and retry to sync sales and dashboard data.</p>
    <button class="btn" type="button" onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
